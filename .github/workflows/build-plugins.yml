name: Build & Release Plugin Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # für GitHub Release + Commit zurück auf main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 nötig damit wir danach committen können
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build ZIPs and update manifest.json
        run: python scripts/build_release.py ${{ github.ref_name }}

      - name: Commit updated manifest.json back to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          # Nur committen wenn sich etwas geändert hat
          git diff --staged --quiet || git commit -m "chore: update manifest.json for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Create GitHub Release with plugin ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "AION Plugins ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/manifest.json
